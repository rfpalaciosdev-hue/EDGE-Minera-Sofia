# ================================================================
# AIM SCADA Edge — Mosquitto MQTT Broker
# ================================================================
#
# TOPICOS QUE ESCUCHA EL AGENTE:
#
#  Formato 1 — Estándar AIM (PLC/Simulador):
#    {TENANT_SLUG}/{SITE_ID}/{area}/{maquina}/{sensor}
#    Ej: minera-sofia/SITE_SOFIA/molino/motor_1/corriente
#    Payload: { "value": 142.5, "is_online": true, "timestamp": "..." }
#
#  Formato 2 — ESP32 / Arduino / Dispositivos IoT:
#    scada/{area}/{maquina}/{grupo_sensores}
#    Ej: scada/sala_electrica/tablero_a/energia
#    Payload: { "voltaje": 380, "corriente": 12.3, "is_online": true }
#    (todas las claves numéricas del JSON se convierten en tags automáticamente)
#
# ================================================================

listener 1883 0.0.0.0
allow_anonymous true

# Para producción en redes industriales cerradas, anonymous está OK.
# Si la red SCADA es compartida o pública, agregar autenticación:
# password_file /mosquitto/config/passwords
# allow_anonymous false
