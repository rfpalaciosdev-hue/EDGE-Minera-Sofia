name: 🏭 Deploy Edge Agent

on:
  push:
    branches:
      - main
    paths:
      - 'agent/**'
      - 'docker-compose.yml'
      - 'mosquitto/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Forzar rebuild de la imagen Docker (incluso sin cambios en agent/)'
        required: false
        default: 'false'
        type: boolean

# Usar Git Bash en Windows (viene incluido con Git for Windows)
# Permite usar comandos bash/unix en un runner Windows 11 sin instalar nada extra
defaults:
  run:
    shell: bash

jobs:
  deploy:
    name: 🚀 Deploy to Edge Node — Minera-Sofia
    runs-on: self-hosted
    environment: Minera-Sofia

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔑 Generar archivo .env desde GitHub Secrets
        run: |
          # printf es más portable que heredoc en Git Bash / Windows
          printf 'TENANT_SLUG=%s\n' "${{ secrets.TENANT_SLUG }}" > .env
          printf 'SITE_ID=%s\n' "${{ secrets.SITE_ID }}" >> .env
          printf 'DEVICE_TOKEN=%s\n' "${{ secrets.DEVICE_TOKEN }}" >> .env
          printf 'CLOUD_API_URL=%s\n' "${{ secrets.CLOUD_API_URL }}" >> .env
          printf 'INFLUX_ADMIN_USER=%s\n' "${{ secrets.INFLUX_ADMIN_USER }}" >> .env
          printf 'INFLUX_ADMIN_PASSWORD=%s\n' "${{ secrets.INFLUX_ADMIN_PASSWORD }}" >> .env
          printf 'INFLUX_ORG=%s\n' "${{ secrets.INFLUX_ORG }}" >> .env
          printf 'INFLUX_BUCKET=%s\n' "${{ secrets.INFLUX_BUCKET }}" >> .env
          printf 'INFLUX_TOKEN=%s\n' "${{ secrets.INFLUX_TOKEN }}" >> .env
          printf 'AGENT_VERSION=%s\n' "${{ github.sha }}" >> .env
          echo "✅ .env generado (valores ocultos por seguridad)"

      - name: 🐳 Pull de imágenes base (actualizaciones de seguridad)
        run: docker compose pull mosquitto_edge influxdb_edge

      - name: 🔨 Build del agente
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep "^agent/" || true)
          if [[ "${{ inputs.force_rebuild }}" == "true" ]] || [[ -n "$CHANGED" ]]; then
            echo "🔨 Cambios en agent/ o rebuild forzado — rebuildeando imagen..."
            docker compose build --no-cache edge_agent
          else
            echo "⏩ Sin cambios en agent/ — build incremental (usa caché)"
            docker compose build edge_agent
          fi

      - name: 🚀 Deploy (zero-downtime)
        run: |
          docker compose up -d --remove-orphans
          echo "✅ Stack levantado"

      - name: 🔍 Verificar salud de los servicios (esperar 20s)
        run: |
          sleep 20
          echo "=== Estado de los contenedores ==="
          docker compose ps

          echo ""
          echo "=== Health check Agente ==="
          curl -sf http://localhost:8080/health && echo "✅ Agente OK" || echo "⚠️ Agente no responde aún (puede seguir iniciando)"

          echo ""
          echo "=== Health check InfluxDB ==="
          curl -sf http://localhost:8087/ping && echo "✅ InfluxDB OK" || echo "⚠️ InfluxDB no responde"

      - name: 🧹 Limpiar imágenes Docker antiguas
        run: docker image prune -f

      - name: 📋 Resumen del deploy
        if: always()
        run: |
          echo "=================================================="
          echo "  AIM SCADA Edge — Resumen de Deploy"
          echo "=================================================="
          echo "  Commit  : ${{ github.sha }}"
          echo "  Autor   : ${{ github.actor }}"
          echo "  Rama    : ${{ github.ref_name }}"
          echo "  Ambiente: Minera-Sofia"
          echo "  Fecha   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=================================================="
          docker compose ps
